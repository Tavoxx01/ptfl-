<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tavoxx | Portóflio</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--fg:#f0ede8;--acc:#c8ff00;--muted:#1a1a1a;--card:#111}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:'Space Mono',monospace;overflow-x:hidden;cursor:none}
#cursor{width:10px;height:10px;background:var(--acc);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:difference}
#cursor-trail{width:30px;height:30px;border:1px solid var(--acc);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;opacity:.35;transition:all .08s linear}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.5}
header{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 8vw;position:relative;overflow:hidden}
header::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(200,255,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(200,255,0,.035) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.hero-line{font-family:'Syne',sans-serif;font-size:clamp(3.5rem,11vw,10rem);font-weight:800;line-height:.88;letter-spacing:-.03em}
.hero-line .acc{color:var(--acc)}
.hero-sub{margin-top:2rem;font-size:.75rem;letter-spacing:.25em;color:#666;text-transform:uppercase}
.hero-sub span{color:var(--acc);margin-right:.5rem}
.scroll-hint{position:absolute;bottom:3rem;left:8vw;font-size:.65rem;letter-spacing:.2em;color:#444;text-transform:uppercase;display:flex;align-items:center;gap:1rem}
.scroll-hint::before{content:'';display:block;width:36px;height:1px;background:#444}
section{padding:8rem 8vw}
.sec-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.sec-label::after{content:'';flex:1;height:1px;background:#1e1e1e}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,4rem);font-weight:800;margin-bottom:3rem}
#gallery{background:#0b0b0b}
.gallery-grid{columns:3 260px;column-gap:.75rem}
.gallery-item{break-inside:avoid;margin-bottom:.75rem;overflow:hidden;position:relative;cursor:none}
.gallery-item img{width:100%;display:block;transition:transform .5s cubic-bezier(.16,1,.3,1);filter:grayscale(15%)}
.gallery-item:hover img{transform:scale(1.05);filter:grayscale(0%)}
.gallery-item::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(200,255,0,.07),transparent);opacity:0;transition:opacity .3s}
.gallery-item:hover::after{opacity:1}
.gallery-loading,.gallery-empty{text-align:center;padding:5rem;color:#444;font-size:.75rem;letter-spacing:.2em}
.gallery-loading span{animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
#contact{text-align:center}
.contact-inner{max-width:560px;margin:0 auto}
.contact-inner p{color:#666;line-height:1.9;font-size:.82rem;margin-bottom:3rem}
.btn-discord{display:inline-flex;align-items:center;gap:.75rem;background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;padding:1rem 2.5rem;text-decoration:none;letter-spacing:.08em;transition:all .2s ease;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.btn-discord:hover{background:#000;color:var(--acc);outline:1px solid var(--acc)}
.discord-icon{width:20px;height:20px;fill:currentColor}
footer{border-top:1px solid #161616;padding:2rem 8vw;display:flex;justify-content:space-between;align-items:center;font-size:.6rem;color:#333;letter-spacing:.1em}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:none}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;align-items:center;justify-content:center;cursor:none}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
#lb-close{position:fixed;top:2rem;right:2rem;color:var(--acc);font-size:2rem;cursor:none;line-height:1;font-family:'Syne',sans-serif}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-trail"></div>
<header>
<div class="hero-line reveal">TAVOXX</div>
<div class="hero-line reveal" style="transition-delay:.1s">PORT<span class="acc">FÓ</span>LIO</div>
<div class="hero-sub reveal" style="transition-delay:.2s"><span>▸</span> DESENVOLVEDOR &nbsp;/&nbsp; CRIATIVO &nbsp;/&nbsp; BUILDER</div>
<div class="scroll-hint">SCROLL</div>
</header>
<section id="gallery">
<div class="sec-label">TRABALHOS</div>
<div class="sec-title reveal">Galeria</div>
<div class="gallery-grid" id="galleryGrid"><div class="gallery-loading"><span>_</span> carregando...</div></div>
</section>
<section id="contact">
<div class="sec-label">CONTATO</div>
<div class="contact-inner">
<div class="sec-title reveal">Bora conversar?</div>
<p class="reveal">Tem um projeto, ideia ou só quer trocar uma ideia — me chama no Discord.</p>
<a href="https://discord.gg/XTr4xPzVQa" target="_blank" rel="noopener" class="btn-discord reveal">

DISCORD
</a>
</div>
</section>
<footer><span>© 2025 TAVOXX</span><span>PORTFÓLIO</span></footer>
<div id="lightbox"><div id="lb-close">✕</div><img id="lb-img" src="" alt=""/></div>
